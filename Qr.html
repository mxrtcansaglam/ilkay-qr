

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İlkay Düğün Salonu - Konum</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1920') no-repeat center center/cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 420px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    .logo {
      width: 220px;
      display:block;
      margin: 0 auto;
    }

    .logo-wrap{
      width:100%;
      padding:12px 0;
      border-radius:12px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0));
      margin-bottom:20px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
      color: #111827;
    }

    .subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 20px;
    }

    .highlight {
      font-size: 13px;
      color: #d97706;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .apple {
      background: #000;
      color: white;
    }

    .google {
      background: #22c55e;
      color: #052e16;
    }

    .btn:hover {
      transform: scale(1.03);
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: #374151;
    }

  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="card">

    <!-- LOGO -->
    <div class="logo-wrap">
    <img src="C:\Users\mertc\OneDrive\Masaüstü\web_site\logo ilkay deren .png" alt="İlkay Düğün Salonu" class="logo" />
  </div>

    <div class="highlight">HAYALLERE GİDEN İLK ADIM</div>

    <h1>Eğlenceye Hoş Geldiniz</h1>
    <p class="subtitle">En özel gününüz için doğru adrestesiniz</p>

    <a class="btn apple" href="https://maps.apple/p/hvq0m1QMxRLpZG">Apple Maps ile Aç</a>
    <a class="btn google" href="https://maps.app.goo.gl/twHXPgARXk5zADX27">Google Maps ile Aç</a>

    <div class="footer">💍 Sizi bekliyoruz</div>

  </div>

  <script>
    const appleMapsLink = "https://maps.apple/p/hvq0m1QMxRLpZG";
    const googleMapsLink = "https://maps.app.goo.gl/twHXPgARXk5zADX27";

    const userAgent = navigator.userAgent || navigator.vendor || window.opera;
    const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
    const isAndroid = /android/i.test(userAgent);

    setTimeout(() => {
      if (isIOS) {
        window.location.href = appleMapsLink;
      } else if (isAndroid && !googleMapsLink.includes("https://maps.app.goo.gl/twHXPgARXk5zADX27")) {
        window.location.href = googleMapsLink;
      }
    }, 1200);
  </script>

</body>
</html>
